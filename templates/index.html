<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeGen - Automated Scheduling</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="file"], input[type="number"], select { width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; }
        button { background-color: #0056b3; color: white; padding: 10px 20px; border: none; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #004494; }
        .download-btn { background-color: #28a745; display: inline-block; text-decoration: none; margin-right: 10px; margin-top: 20px; padding: 10px 15px; color: white;}
        #result-message { margin-top: 20px; font-weight: bold; }
        .combo-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px;}
        .combo-row select { margin-bottom: 0; }
    </style>
</head>
<body>

    <h1>TimeGen: Timetable Generator</h1>
    <p>Upload your configurations to generate the academic timetable.</p>

    <form id="uploadForm">
        <div class="form-group">
            <label for="working_days">Working Days per Week:</label>
            <input type="number" id="working_days" name="working_days" value="5" min="1" max="7" required>
        </div>

        <div class="form-group">
            <label for="periods_per_day">Periods per Day <small style="font-weight: normal; color: #555;">(Include breaks as separate periods)</small>:</label>
            <input type="number" id="periods_per_day" name="periods_per_day" value="7" min="1" required>
        </div>

        <div class="form-group">
            <label for="partial_tt">Partially Filled Timetable (Excel/CSV):</label>
            <input type="file" id="partial_tt" name="partial_tt" accept=".xlsx, .xls, .csv" required>
        </div>

        <div class="form-group">
            <label for="course_teacher">Course-Teacher Mapping (Excel/CSV):</label>
            <input type="file" id="course_teacher" name="course_teacher" accept=".xlsx, .xls, .csv" required>
        </div>

        <div id="unsuitable_ui" style="display:none; background:#f4f7f6; padding:15px; border-left: 4px solid #17a2b8; margin-bottom:20px;">
            <h3 style="margin-top:0;">Block Teacher Availability</h3>
            <p style="font-size: 14px; color: #555;">Select a teacher and block out specific periods where they cannot be assigned.</p>
            <div class="combo-row">
                <select id="us_teacher" style="flex: 2;"><option value="">-- Select Teacher --</option></select>
                <select id="us_day" style="flex: 1;"></select>
                <select id="us_period" style="flex: 1.5;"></select>
                <button type="button" id="btnAddRule" style="background-color: #17a2b8; padding: 8px 15px;">Add Rule</button>
            </div>
            <ul id="rulesList" style="list-style-type: none; padding: 0;"></ul>
            <input type="hidden" name="unsuitable_slots" id="unsuitable_slots" value="[]">
        </div>

        <button type="submit">Generate Timetable</button>
    </form>

    <div id="result-message"></div>

    <div id="download-section" style="display: none;">
        <a href="/download/class_timetable" class="download-btn">Download Class Matrices</a>
        <a href="/download/teacher_timetable" class="download-btn">Download Teacher Workloads</a>
    </div>

    <script>
        let rules = [];

        // Auto-fetch metadata when files change
        const inputsToWatch = ['course_teacher', 'partial_tt', 'working_days', 'periods_per_day'];
        inputsToWatch.forEach(id => {
            document.getElementById(id).addEventListener('change', fetchMetadata);
        });

        async function fetchMetadata() {
            const ctFile = document.getElementById('course_teacher').files[0];
            if (!ctFile) return; // Wait until they upload the Course Teacher file
            
            const formData = new FormData(document.getElementById('uploadForm'));
            try {
                const response = await fetch('/parse_metadata', { method: 'POST', body: formData });
                if (response.ok) {
                    const data = await response.json();
                    populateCombos(data);
                    document.getElementById('unsuitable_ui').style.display = 'block';
                }
            } catch (e) { console.error("Could not fetch metadata"); }
        }

        function populateCombos(data) {
            const tSel = document.getElementById('us_teacher');
            const dSel = document.getElementById('us_day');
            const pSel = document.getElementById('us_period');
            
            // Keep current selection if possible, otherwise clear
            tSel.innerHTML = '<option value="">-- Select Teacher --</option>';
            data.teachers.forEach(t => tSel.innerHTML += `<option value="${t}">${t}</option>`);
            
            dSel.innerHTML = '';
            data.days.forEach((d, i) => dSel.innerHTML += `<option value="${i}">${d}</option>`);
            
            pSel.innerHTML = '';
            data.period_labels.forEach((p, i) => pSel.innerHTML += `<option value="${i}">${p}</option>`);
        }

        // Add Rule logic
        document.getElementById('btnAddRule').addEventListener('click', function() {
            const tSel = document.getElementById('us_teacher');
            const dSel = document.getElementById('us_day');
            const pSel = document.getElementById('us_period');
            
            if(!tSel.value) return alert("Please select a teacher.");
            
            const rule = {
                teacher: tSel.value,
                day: parseInt(dSel.value),
                period: parseInt(pSel.value),
                label: `<b>${tSel.value}</b> cannot teach on <b>${dSel.options[dSel.selectedIndex].text}</b> during <b>${pSel.options[pSel.selectedIndex].text}</b>`
            };
            
            rules.push(rule);
            updateRulesUI();
        });

        function updateRulesUI() {
            document.getElementById('unsuitable_slots').value = JSON.stringify(rules);
            const ul = document.getElementById('rulesList');
            ul.innerHTML = '';
            rules.forEach((r, idx) => {
                const li = document.createElement('li');
                li.style.marginBottom = '8px';
                li.innerHTML = `❌ ${r.label} <button type="button" onclick="removeRule(${idx})" style="margin-left:15px; padding:3px 8px; background:#dc3545; border:none; color:white; cursor:pointer; border-radius:3px; font-size:12px;">Remove</button>`;
                ul.appendChild(li);
            });
        }

        window.removeRule = function(idx) {
            rules.splice(idx, 1);
            updateRulesUI();
        };

        // Main Form Submission
        document.getElementById('uploadForm').onsubmit = async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const resultDiv = document.getElementById('result-message');
            const downloadSection = document.getElementById('download-section');
            
            let warningDiv = document.getElementById('warning-message');
            if (!warningDiv) {
                warningDiv = document.createElement('div');
                warningDiv.id = 'warning-message';
                warningDiv.style.cssText = "display: none; color: #856404; background-color: #fff3cd; padding: 15px; margin-top: 20px; border: 1px solid #ffeeba; border-radius: 5px;";
                downloadSection.parentNode.insertBefore(warningDiv, downloadSection);
            }
            
            resultDiv.innerText = "Generating... Please wait.";
            resultDiv.style.color = "black";
            downloadSection.style.display = 'none';
            warningDiv.style.display = 'none';

            try {
                const response = await fetch('/generate', { method: 'POST', body: formData });
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerText = data.message;
                    resultDiv.style.color = "green";
                    downloadSection.style.display = 'block';
                    
                    if (data.warnings && data.warnings.length > 0) {
                        let html = "<h4 style='margin-top:0;'>⚠️ Scheduling Constraints Bypassed</h4><p style='font-size: 14px;'>To ensure all required classes were scheduled, the following compromises were made:</p><ul style='font-size: 14px;'>";
                        data.warnings.forEach(w => { html += `<li>${w}</li>`; });
                        html += "</ul>";
                        warningDiv.innerHTML = html;
                        warningDiv.style.display = 'block';
                    }
                } else {
                    resultDiv.innerText = "Error: " + data.error;
                    resultDiv.style.color = "red";
                }
            } catch (error) {
                resultDiv.innerText = "A network error occurred.";
                resultDiv.style.color = "red";
            }
        };
    </script>
</body>
</html>
